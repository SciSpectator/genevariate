<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="phase15Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="guiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="#fafafa"/>

  <!-- Title Bar -->
  <rect x="20" y="15" width="1060" height="48" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="550" y="46" text-anchor="middle" font-size="20" font-weight="bold" fill="white">GeneVariate v2.0 -- Pipeline Architecture</text>

  <!-- ============ ROW 1: Input Sources ============ -->
  <!-- GEOmetadb -->
  <rect x="30" y="85" width="160" height="60" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">GEOmetadb</text>
  <text x="110" y="128" text-anchor="middle" font-size="10" fill="#3949ab">SQLite (1.1 GB)</text>

  <!-- NCBI GEO -->
  <rect x="210" y="85" width="160" height="60" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">NCBI GEO</text>
  <text x="290" y="128" text-anchor="middle" font-size="10" fill="#3949ab">GSE/GSM Metadata</text>

  <!-- GPL Platforms -->
  <rect x="390" y="85" width="160" height="60" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="470" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">GPL Platforms</text>
  <text x="470" y="128" text-anchor="middle" font-size="10" fill="#3949ab">570 | 96 | 6947 | ...</text>

  <!-- Ollama LLMs -->
  <rect x="580" y="85" width="180" height="60" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Ollama LLM Server</text>
  <text x="670" y="124" text-anchor="middle" font-size="9" fill="#f57f17">gemma2:2b | gemma2:9b</text>
  <text x="670" y="137" text-anchor="middle" font-size="9" fill="#f57f17">nomic-embed-text</text>

  <!-- GPU/CPU -->
  <rect x="790" y="85" width="140" height="60" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">GPU / CPU</text>
  <text x="860" y="124" text-anchor="middle" font-size="9" fill="#c62828">NVIDIA | AMD | CPU</text>
  <text x="860" y="137" text-anchor="middle" font-size="9" fill="#c62828">Auto-Detection</text>

  <!-- Watchdog -->
  <rect x="950" y="85" width="120" height="60" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">Watchdog</text>
  <text x="1010" y="124" text-anchor="middle" font-size="9" fill="#c62828">Fluid Scaling</text>
  <text x="1010" y="137" text-anchor="middle" font-size="9" fill="#c62828">Thermal Guard</text>

  <!-- Arrows from sources down -->
  <line x1="110" y1="145" x2="110" y2="180" stroke="#3949ab" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="290" y1="145" x2="290" y2="180" stroke="#3949ab" stroke-width="1.5"/>
  <line x1="470" y1="145" x2="470" y2="180" stroke="#3949ab" stroke-width="1.5"/>

  <!-- ============ ROW 2: Phase 1 ============ -->
  <rect x="30" y="180" width="530" height="120" rx="10" fill="url(#phase1Grad)" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="186" width="160" height="22" rx="4" fill="#1565c0"/>
  <text x="120" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1: Extract</text>
  <text x="220" y="201" font-size="10" fill="#1565c0" font-style="italic">gemma2:2b (fast)</text>

  <text x="50" y="225" font-size="10" fill="#1a237e">1. Query GEOmetadb for GSE experiments</text>
  <text x="50" y="242" font-size="10" fill="#1a237e">2. Read GSM title, source, characteristics</text>
  <text x="50" y="259" font-size="10" fill="#1a237e">3. LLM extracts Tissue, Condition, Treatment</text>
  <text x="50" y="276" font-size="10" fill="#1a237e">4. Mark insufficient data as "Not Specified"</text>
  <text x="50" y="293" font-size="10" fill="#0d47a1" font-weight="bold">Output: Raw labels CSV (batch_size=200)</text>

  <!-- Arrow Phase 1 -> Phase 1.5 -->
  <line x1="295" y1="300" x2="295" y2="330" stroke="#e65100" stroke-width="2"/>
  <polygon points="295,338 289,328 301,328" fill="#e65100"/>

  <!-- ============ ROW 3: Phase 1.5 ============ -->
  <rect x="30" y="340" width="530" height="110" rx="10" fill="url(#phase15Grad)" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="346" width="210" height="22" rx="4" fill="#e65100"/>
  <text x="145" y="361" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1.5: Deterministic Collapse</text>
  <text x="268" y="361" font-size="10" fill="#e65100" font-style="italic">rule-based (no LLM)</text>

  <text x="50" y="385" font-size="10" fill="#4e342e">1. GSE-scoped exact match against known labels</text>
  <text x="50" y="402" font-size="10" fill="#4e342e">2. Abbreviation matching with numeric guards</text>
  <text x="50" y="419" font-size="10" fill="#4e342e">3. Dominant sibling label rescue (GSEContext)</text>
  <text x="50" y="436" font-size="10" fill="#bf360c" font-weight="bold">Output: Reduced NS labels (fast, deterministic)</text>

  <!-- Arrow Phase 1.5 -> Phase 2 -->
  <line x1="295" y1="450" x2="295" y2="480" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="295,488 289,478 301,478" fill="#2e7d32"/>

  <!-- ============ ROW 4: Phase 2 ============ -->
  <rect x="30" y="490" width="530" height="120" rx="10" fill="url(#phase2Grad)" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="496" width="230" height="22" rx="4" fill="#2e7d32"/>
  <text x="155" y="511" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 2: ReAct Collapse Agent</text>
  <text x="285" y="511" font-size="10" fill="#2e7d32" font-style="italic">gemma2:9b (reasoning)</text>

  <text x="50" y="535" font-size="10" fill="#1b5e20">1. Embed raw label via nomic-embed-text</text>
  <text x="50" y="552" font-size="10" fill="#1b5e20">2. Cosine search against cluster vocabulary</text>
  <text x="50" y="569" font-size="10" fill="#1b5e20">3. ReAct agent: SEARCH / PICK / NEW_CLUSTER</text>
  <text x="50" y="586" font-size="10" fill="#1b5e20">4. Episodic memory write + confidence score</text>
  <text x="50" y="603" font-size="10" fill="#2e7d32" font-weight="bold">Output: Canonical labels + collapse report</text>

  <!-- ============ RIGHT COLUMN: Memory System ============ -->
  <rect x="590" y="180" width="480" height="230" rx="10" fill="url(#memoryGrad)" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="186" width="220" height="22" rx="4" fill="#6a1b9a"/>
  <text x="710" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4-Tier Memory System (SQLite)</text>

  <!-- Tier boxes -->
  <rect x="605" y="218" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="615" y="236" font-size="10" font-weight="bold" fill="#4a148c">Tier 1: Cluster Map</text>
  <text x="615" y="250" font-size="9" fill="#6a1b9a">O(1) synonym lookup across all forms</text>

  <rect x="840" y="218" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="850" y="236" font-size="10" font-weight="bold" fill="#4a148c">Tier 2: Semantic Memory</text>
  <text x="850" y="250" font-size="9" fill="#6a1b9a">nomic-embed-text cosine RAG</text>

  <rect x="605" y="268" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="615" y="286" font-size="10" font-weight="bold" fill="#4a148c">Tier 3: Episodic Log</text>
  <text x="615" y="300" font-size="9" fill="#6a1b9a">Resolution history + confidence</text>

  <rect x="840" y="268" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="850" y="286" font-size="10" font-weight="bold" fill="#4a148c">Tier 4: Knowledge Graph</text>
  <text x="850" y="300" font-size="9" fill="#6a1b9a">Synonym / hierarchy triples</text>

  <!-- Resolution priority -->
  <text x="605" y="330" font-size="10" fill="#4a148c" font-weight="bold">Resolution Priority:</text>
  <rect x="605" y="338" width="78" height="20" rx="4" fill="#8e24aa"/>
  <text x="644" y="352" text-anchor="middle" font-size="9" fill="white">Episodic</text>
  <text x="690" y="352" font-size="11" fill="#6a1b9a">&#x2192;</text>
  <rect x="703" y="338" width="62" height="20" rx="4" fill="#ab47bc"/>
  <text x="734" y="352" text-anchor="middle" font-size="9" fill="white">KGraph</text>
  <text x="772" y="352" font-size="11" fill="#6a1b9a">&#x2192;</text>
  <rect x="785" y="338" width="90" height="20" rx="4" fill="#ce93d8"/>
  <text x="830" y="352" text-anchor="middle" font-size="9" fill="#4a148c">Semantic+LLM</text>
  <text x="882" y="352" font-size="11" fill="#6a1b9a">&#x2192;</text>
  <rect x="895" y="338" width="65" height="20" rx="4" fill="#e1bee7"/>
  <text x="928" y="352" text-anchor="middle" font-size="9" fill="#4a148c">Rules</text>

  <!-- Thread-safe note -->
  <text x="605" y="390" font-size="9" fill="#6a1b9a" font-style="italic">Thread-safe with WAL journaling | match_threshold: 0.72</text>

  <!-- ============ RIGHT COLUMN: Analysis / GUI ============ -->
  <rect x="590" y="430" width="480" height="180" rx="10" fill="url(#guiGrad)" stroke="#00695c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="436" width="280" height="22" rx="4" fill="#00695c"/>
  <text x="740" y="451" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Step 3: Interactive Analysis (Tkinter GUI)</text>

  <!-- Analysis features in 2 columns -->
  <text x="610" y="475" font-size="10" fill="#004d40" font-weight="bold">Visualization</text>
  <text x="610" y="492" font-size="9" fill="#00695c">&#x2022; Expression histograms + KDE</text>
  <text x="610" y="507" font-size="9" fill="#00695c">&#x2022; PCA / dimensionality reduction</text>
  <text x="610" y="522" font-size="9" fill="#00695c">&#x2022; Region selection &amp; subset analysis</text>
  <text x="610" y="537" font-size="9" fill="#00695c">&#x2022; Box plots &amp; violin plots</text>

  <text x="830" y="475" font-size="10" fill="#004d40" font-weight="bold">Statistics</text>
  <text x="830" y="492" font-size="9" fill="#00695c">&#x2022; Wilcoxon rank-sum test</text>
  <text x="830" y="507" font-size="9" fill="#00695c">&#x2022; Student's t-test (Welch)</text>
  <text x="830" y="522" font-size="9" fill="#00695c">&#x2022; Wasserstein distance</text>
  <text x="830" y="537" font-size="9" fill="#00695c">&#x2022; Cohen's d &amp; Cliff's delta</text>

  <text x="610" y="560" font-size="9" fill="#004d40" font-weight="bold">Export: CSV results + publication-quality PNG figures</text>

  <!-- ============ BOTTOM: Output ============ -->
  <rect x="30" y="640" width="1040" height="60" rx="10" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="646" width="100" height="22" rx="4" fill="#1a237e"/>
  <text x="90" y="661" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Output</text>

  <text x="160" y="665" font-size="10" fill="#1a237e" font-weight="bold">Per-Platform CSVs:</text>
  <text x="160" y="685" font-size="9" fill="#3949ab">{GPL}_labels.csv (Tissue, Condition, Treatment) | {GPL}_NS_repaired.csv | {GPL}_collapse_report.csv | Checkpoints every 1,000 samples</text>

  <!-- Connecting arrows Phase 2 -> Output -->
  <line x1="295" y1="610" x2="295" y2="640" stroke="#1a237e" stroke-width="2"/>
  <polygon points="295,640 289,630 301,630" fill="#1a237e"/>

  <!-- GUI -> Output -->
  <line x1="830" y1="610" x2="830" y2="640" stroke="#1a237e" stroke-width="2"/>
  <polygon points="830,640 824,630 836,630" fill="#1a237e"/>

  <!-- Memory -> Phase 2 connection -->
  <line x1="590" y1="350" x2="560" y2="350" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="350" x2="560" y2="550" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Ollama -> Phases connection -->
  <line x1="670" y1="145" x2="670" y2="165" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="670" y1="165" x2="560" y2="165" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="165" x2="560" y2="250" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,3"/>

</svg>
