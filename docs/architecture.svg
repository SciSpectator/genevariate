<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
    <linearGradient id="canonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="phase15Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="analysisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <linearGradient id="novelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a237e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="900" rx="12" fill="#fafafa"/>

  <!-- Title Bar -->
  <rect x="20" y="15" width="1060" height="48" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="550" y="46" text-anchor="middle" font-size="20" font-weight="bold" fill="white">GeneVariate v2.1 — Pipeline Architecture</text>

  <!-- ============ ROW 1: Data Sources (cross-technology) ============ -->
  <text x="30" y="85" font-size="11" font-weight="bold" fill="#1a237e">Data sources (cross-technology ingestion)</text>

  <!-- GEOmetadb -->
  <rect x="30" y="95" width="160" height="60" rx="8" fill="url(#sourceGrad)" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">GEOmetadb</text>
  <text x="110" y="134" text-anchor="middle" font-size="9" fill="#3949ab">SQLite catalogue (1.1 GB)</text>

  <!-- GEO GSE/GSM -->
  <rect x="200" y="95" width="160" height="60" rx="8" fill="url(#sourceGrad)" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">NCBI GEO (microarray)</text>
  <text x="280" y="134" text-anchor="middle" font-size="9" fill="#3949ab">GSE/GSM · GPL570/96/6947…</text>

  <!-- ARCHS4 -->
  <rect x="370" y="95" width="160" height="60" rx="8" fill="url(#sourceGrad)" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">ARCHS4 (bulk RNA-seq)</text>
  <text x="450" y="134" text-anchor="middle" font-size="9" fill="#3949ab">uniformly-processed HDF5</text>

  <!-- Methylation / peaks -->
  <rect x="540" y="95" width="160" height="60" rx="8" fill="url(#sourceGrad)" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Methylation / peaks</text>
  <text x="620" y="134" text-anchor="middle" font-size="9" fill="#3949ab">β-values · intensities</text>

  <!-- scRNA-seq pseudobulk -->
  <rect x="710" y="95" width="160" height="60" rx="8" fill="url(#sourceGrad)" stroke="#3949ab" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="790" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">scRNA-seq pseudobulk</text>
  <text x="790" y="134" text-anchor="middle" font-size="9" fill="#3949ab">single-cell → bulk</text>

  <!-- Ollama LLM Server + GPU block (right) -->
  <rect x="880" y="95" width="195" height="60" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="977" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Ollama LLM Server</text>
  <text x="977" y="131" text-anchor="middle" font-size="9" fill="#f57f17">gemma4:e2b · 32k ctx · unlimited out</text>
  <text x="977" y="145" text-anchor="middle" font-size="9" fill="#f57f17">nomic-embed-text</text>

  <!-- Canonical format row -->
  <rect x="30" y="175" width="840" height="50" rx="8" fill="url(#canonGrad)" stroke="#00838f" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="181" width="210" height="20" rx="4" fill="#00838f"/>
  <text x="145" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Canonical format (BaseSource)</text>
  <text x="260" y="196" font-size="10" fill="#00695c" font-style="italic">GSM | series_id | GENE1 | GENE2 | …</text>
  <text x="40" y="217" font-size="9" fill="#00695c">· qnorm, log-transform, probe→gene mapping · every downstream module consumes this shape uniformly</text>

  <!-- GPU/CPU + Watchdog (right of canonical) -->
  <rect x="880" y="175" width="195" height="50" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="977" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">GPU/CPU · Watchdog</text>
  <text x="977" y="210" text-anchor="middle" font-size="9" fill="#c62828">NVIDIA / AMD / CPU · fluid scaling · thermal guard</text>

  <!-- Arrows from sources → canonical -->
  <line x1="110" y1="155" x2="110" y2="175" stroke="#3949ab" stroke-width="1.5"/>
  <line x1="280" y1="155" x2="280" y2="175" stroke="#3949ab" stroke-width="1.5"/>
  <line x1="450" y1="155" x2="450" y2="175" stroke="#3949ab" stroke-width="1.5"/>
  <line x1="620" y1="155" x2="620" y2="175" stroke="#3949ab" stroke-width="1.5"/>
  <line x1="790" y1="155" x2="790" y2="175" stroke="#3949ab" stroke-width="1.5"/>

  <!-- Arrow canonical → phase 1 -->
  <line x1="295" y1="225" x2="295" y2="255" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowNavy)"/>

  <!-- ============ LEFT COLUMN: Label curation (Phase 1 → 1.5 → 2) ============ -->
  <rect x="30" y="255" width="530" height="120" rx="10" fill="url(#phase1Grad)" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="261" width="160" height="22" rx="4" fill="#1565c0"/>
  <text x="120" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1: Extract</text>
  <text x="220" y="276" font-size="10" fill="#1565c0" font-style="italic">gemma4:e2b · 32k ctx</text>

  <text x="50" y="300" font-size="10" fill="#1a237e">1. Per-GSE worker reads full title, characteristics, GSE summary</text>
  <text x="50" y="317" font-size="10" fill="#1a237e">2. LLM extracts Tissue / Condition / Treatment (verbatim)</text>
  <text x="50" y="334" font-size="10" fill="#1a237e">3. Multi-value (Blood; Bone Marrow) + coded-value (0/1, Y/N) support</text>
  <text x="50" y="351" font-size="10" fill="#1a237e">4. Unspecified → "Not Specified" · checkpoints every 200 samples</text>
  <text x="50" y="368" font-size="10" fill="#0d47a1" font-weight="bold">Output: raw labels CSV</text>

  <line x1="295" y1="375" x2="295" y2="405" stroke="#e65100" stroke-width="2" marker-end="url(#arrowNavy)"/>

  <!-- Phase 1.5 -->
  <rect x="30" y="410" width="530" height="100" rx="10" fill="url(#phase15Grad)" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="416" width="220" height="22" rx="4" fill="#e65100"/>
  <text x="150" y="431" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 1.5: Deterministic collapse</text>
  <text x="275" y="431" font-size="10" fill="#e65100" font-style="italic">rule-based (no LLM)</text>

  <text x="50" y="455" font-size="10" fill="#4e342e">1. GSE-scoped exact match against known labels</text>
  <text x="50" y="472" font-size="10" fill="#4e342e">2. Abbreviation matching with numeric guards</text>
  <text x="50" y="489" font-size="10" fill="#4e342e">3. Dominant sibling label rescue via GSEContext</text>
  <text x="50" y="504" font-size="10" fill="#bf360c" font-weight="bold">Output: reduced NS labels</text>

  <line x1="295" y1="510" x2="295" y2="540" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowNavy)"/>

  <!-- Phase 2 -->
  <rect x="30" y="545" width="530" height="120" rx="10" fill="url(#phase2Grad)" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="551" width="230" height="22" rx="4" fill="#2e7d32"/>
  <text x="155" y="566" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Phase 2: ReAct collapse agent</text>
  <text x="285" y="566" font-size="10" fill="#2e7d32" font-style="italic">gemma4:e2b · SEARCH / PICK / NEW_CLUSTER</text>

  <text x="50" y="590" font-size="10" fill="#1b5e20">1. Embed raw label via nomic-embed-text</text>
  <text x="50" y="607" font-size="10" fill="#1b5e20">2. Cosine search against cluster vocabulary (threshold 0.72)</text>
  <text x="50" y="624" font-size="10" fill="#1b5e20">3. ReAct agent with 3 tools: SEARCH / PICK / NEW_CLUSTER</text>
  <text x="50" y="641" font-size="10" fill="#1b5e20">4. Episodic memory write + confidence score</text>
  <text x="50" y="658" font-size="10" fill="#2e7d32" font-weight="bold">Output: canonical labels + collapse report</text>

  <!-- ============ RIGHT COLUMN: Memory System ============ -->
  <rect x="590" y="255" width="480" height="220" rx="10" fill="url(#memoryGrad)" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="261" width="230" height="22" rx="4" fill="#6a1b9a"/>
  <text x="715" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4-tier memory system (SQLite WAL)</text>

  <rect x="605" y="293" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="615" y="311" font-size="10" font-weight="bold" fill="#4a148c">Tier 1: Cluster map</text>
  <text x="615" y="325" font-size="9" fill="#6a1b9a">O(1) synonym lookup across all forms</text>

  <rect x="840" y="293" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="850" y="311" font-size="10" font-weight="bold" fill="#4a148c">Tier 2: Semantic memory</text>
  <text x="850" y="325" font-size="9" fill="#6a1b9a">nomic-embed-text cosine RAG</text>

  <rect x="605" y="343" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="615" y="361" font-size="10" font-weight="bold" fill="#4a148c">Tier 3: Episodic log</text>
  <text x="615" y="375" font-size="9" fill="#6a1b9a">Resolution history + confidence</text>

  <rect x="840" y="343" width="220" height="40" rx="6" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
  <text x="850" y="361" font-size="10" font-weight="bold" fill="#4a148c">Tier 4: Knowledge graph</text>
  <text x="850" y="375" font-size="9" fill="#6a1b9a">Synonym / hierarchy triples</text>

  <text x="605" y="405" font-size="10" fill="#4a148c" font-weight="bold">Resolution priority:</text>
  <rect x="605" y="413" width="78" height="20" rx="4" fill="#8e24aa"/>
  <text x="644" y="427" text-anchor="middle" font-size="9" fill="white">Episodic</text>
  <text x="690" y="427" font-size="11" fill="#6a1b9a">&#x2192;</text>
  <rect x="703" y="413" width="62" height="20" rx="4" fill="#ab47bc"/>
  <text x="734" y="427" text-anchor="middle" font-size="9" fill="white">KGraph</text>
  <text x="772" y="427" font-size="11" fill="#6a1b9a">&#x2192;</text>
  <rect x="785" y="413" width="90" height="20" rx="4" fill="#ce93d8"/>
  <text x="830" y="427" text-anchor="middle" font-size="9" fill="#4a148c">Semantic+LLM</text>
  <text x="882" y="427" font-size="11" fill="#6a1b9a">&#x2192;</text>
  <rect x="895" y="413" width="65" height="20" rx="4" fill="#e1bee7"/>
  <text x="928" y="427" text-anchor="middle" font-size="9" fill="#4a148c">Rules</text>

  <text x="605" y="455" font-size="9" fill="#6a1b9a" font-style="italic">Thread-safe WAL journaling · match_threshold: 0.72</text>

  <!-- Memory ↔ Phase 2 dashed link -->
  <line x1="590" y1="600" x2="560" y2="600" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="420" x2="560" y2="600" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="420" x2="560" y2="420" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============ RIGHT COLUMN: Interactive Analysis (GUI) ============ -->
  <rect x="590" y="490" width="480" height="175" rx="10" fill="url(#analysisGrad)" stroke="#00695c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="496" width="280" height="22" rx="4" fill="#00695c"/>
  <text x="740" y="511" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Step 3: Interactive analysis (Tkinter GUI)</text>

  <text x="610" y="535" font-size="10" fill="#004d40" font-weight="bold">Visualisation</text>
  <text x="610" y="551" font-size="9" fill="#00695c">· Expression histograms + KDE</text>
  <text x="610" y="565" font-size="9" fill="#00695c">· PCA / dimensionality reduction</text>
  <text x="610" y="579" font-size="9" fill="#00695c">· Region selection &amp; subset analysis</text>
  <text x="610" y="593" font-size="9" fill="#00695c">· Box / violin plots</text>

  <text x="830" y="535" font-size="10" fill="#004d40" font-weight="bold">Statistics</text>
  <text x="830" y="551" font-size="9" fill="#00695c">· Wilcoxon rank-sum</text>
  <text x="830" y="565" font-size="9" fill="#00695c">· Student's t-test (Welch)</text>
  <text x="830" y="579" font-size="9" fill="#00695c">· Wasserstein distance</text>
  <text x="830" y="593" font-size="9" fill="#00695c">· Cohen's d &amp; Cliff's delta</text>

  <text x="610" y="615" font-size="9" fill="#004d40" font-weight="bold">BioAI_Engine: 8-class distribution classifier (Normal, Lognormal, Bimodal, …)</text>
  <text x="610" y="632" font-size="9" fill="#004d40" font-weight="bold">Export: CSV results + publication-quality PNG figures</text>

  <!-- ============ BOTTOM: Novel Enrichment ============ -->
  <rect x="30" y="685" width="1040" height="135" rx="10" fill="url(#novelGrad)" stroke="#ef6c00" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="691" width="280" height="22" rx="4" fill="#ef6c00"/>
  <text x="180" y="706" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Novel enrichment methods (core/analysis)</text>

  <!-- 4 method cards -->
  <rect x="45" y="723" width="245" height="88" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
  <text x="55" y="741" font-size="10" font-weight="bold" fill="#e65100">ΔVariance GSEA (logvar_z)</text>
  <text x="55" y="757" font-size="9" fill="#bf360c">Rank genes by log-variance z-test,</text>
  <text x="55" y="770" font-size="9" fill="#bf360c">formally directional scale-shift stat</text>
  <text x="55" y="785" font-size="8" fill="#5d4037">z = (log s²_case − log s²_ctrl) /</text>
  <text x="55" y="797" font-size="8" fill="#5d4037">√(2/(n_c−1) + 2/(n_k−1))</text>

  <rect x="300" y="723" width="245" height="88" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
  <text x="310" y="741" font-size="10" font-weight="bold" fill="#e65100">Bimodality-gated enrichment</text>
  <text x="310" y="757" font-size="9" fill="#bf360c">Restrict gene universe to</text>
  <text x="310" y="770" font-size="9" fill="#bf360c">Bimodal / Multimodal / Heavy-tailed</text>
  <text x="310" y="785" font-size="8" fill="#5d4037">"which pathways are driven by on/off</text>
  <text x="310" y="797" font-size="8" fill="#5d4037">switches, not graded mean shifts?"</text>

  <rect x="555" y="723" width="245" height="88" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
  <text x="565" y="741" font-size="10" font-weight="bold" fill="#e65100">Cross-platform meta-enrichment</text>
  <text x="565" y="757" font-size="9" fill="#bf360c">Combine per-GPL ranks before GSEA</text>
  <text x="565" y="770" font-size="9" fill="#bf360c">(rank-product · Stouffer weighted-z)</text>
  <text x="565" y="785" font-size="8" fill="#5d4037">Survives platform batch effects;</text>
  <text x="565" y="797" font-size="8" fill="#5d4037">directional preserved with Stouffer</text>

  <rect x="810" y="723" width="245" height="88" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
  <text x="820" y="741" font-size="10" font-weight="bold" fill="#e65100">Pseudo-cohort auto-discovery</text>
  <text x="820" y="757" font-size="9" fill="#bf360c">Embed LLM-curated condition labels</text>
  <text x="820" y="770" font-size="9" fill="#bf360c">→ KMeans clusters → enrichment grid</text>
  <text x="820" y="785" font-size="8" fill="#5d4037">No manual case/control assignment;</text>
  <text x="820" y="797" font-size="8" fill="#5d4037">TF-IDF fallback when Ollama is down</text>

  <!-- ============ FAR-BOTTOM: Output ============ -->
  <rect x="30" y="840" width="1040" height="48" rx="10" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="846" width="100" height="22" rx="4" fill="#1a237e"/>
  <text x="90" y="861" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Output</text>
  <text x="160" y="861" font-size="10" fill="#1a237e" font-weight="bold">Per-platform CSVs</text>
  <text x="160" y="876" font-size="9" fill="#3949ab">{GPL}_labels.csv · {GPL}_NS_repaired.csv · {GPL}_collapse_report.csv · enrichment_report.md · GSEA prerank tables</text>

  <!-- Phase 2 → novel enrichment -->
  <line x1="295" y1="665" x2="295" y2="685" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <!-- Analysis → novel enrichment -->
  <line x1="830" y1="665" x2="830" y2="685" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <!-- Novel → output -->
  <line x1="550" y1="820" x2="550" y2="840" stroke="#1a237e" stroke-width="2" marker-end="url(#arrowNavy)"/>

  <!-- Ollama → phases dashed link -->
  <line x1="977" y1="155" x2="977" y2="165" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="977" y1="165" x2="580" y2="165" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="580" y1="165" x2="580" y2="320" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,3"/>

</svg>
